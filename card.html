<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Card</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
</head>
<body>
    <section class="main">
        <h1>Today is Nick's Birthday</h1>
        <img class="logo" src="images/download.jpg" alt="Nick Pic" >
        <h3 id="h3-head">24 year old</h3>
        <h5 id="h5-head">18/06/2003</h5>
    </section>
    <div class="gift-div">
        <h2>Here how happy I am for your birthday</h2>
        <h3>(Hover over the gift)</h3>
        <div class="gift-pic" ></div>
    </div>
    <div class="gift2">
        <h2>How people react when you enter the room.</h2>
        <div class="gift2-pic"></div>
    </div>
</body>
</html>
